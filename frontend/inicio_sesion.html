<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - Beasy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>
    <div class="auth-card">
        <div class="auth-logo">
            <span>🏛️</span>
            <span>Beasy</span>
        </div>

        <h1>Bienvenido de nuevo</h1>
        <p class="auth-subtitle">Ingresa tus credenciales para continuar.</p>

        <form id="form-login">
            <div class="form-group">
                <label for="email">Correo</label>
                <input type="email" id="email" placeholder="nombre@empresa.com">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="password">
                    <span class="material-symbols-outlined toggle-password">visibility</span>
                </div>
            </div>

            <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>

            <button type="submit" class="btn-auth">Iniciar sesión</button>
            <p id="msg-login" style="margin-top:10px; font-size:14px;"></p>
        </form>

        <p class="auth-footer">¿No tienes una cuenta? <a href="registro">Crear cuenta</a></p>
        <p class="auth-footer"><a href="index">Volver al inicio</a></p>
                
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
