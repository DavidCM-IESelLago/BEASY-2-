<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FintechPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        /* Logo */
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
            color: #0056b3;
            font-weight: 700;
            font-size: 22px;
        }

        /* Títulos */
        h1 {
            font-size: 24px;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Formulario */
        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            color: #333;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #0056b3;
        }

        /* Password wrapper para el icono de ojo */
        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            opacity: 0.5;
        }

        /* Enlaces */
        .forgot-password {
            display: block;
            text-align: right;
            font-size: 12px;
            color: #0056b3;
            text-decoration: none;
            margin-top: -5px;
            margin-bottom: 25px;
            font-weight: 600;
        }

        /* Botón */
        .btn-login {
            width: 100%;
            background-color: #005cbd;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn-login:hover {
            background-color: #004a99;
        }

        /* Footer */
        .footer-text {
            margin-top: 30px;
            font-size: 13px;
            color: #444;
        }

        .footer-text a {
            color: #0056b3;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <span class="icon">🏛️</span>
                <span class="brand-name">FintechPro</span>
            </div>

            <h1>Bienvenido de nuevo</h1>
            <p class="subtitle">Ingresa tus credenciales para continuar.</p>

            <form id="form-login">
                <div class="input-group">
                    <label for="email">Correo</label>
                    <input type="email" id="email" placeholder="nombre@empresa.com">
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="••••••••">
                        <span class="toggle-password">👁️</span>
                    </div>
                </div>

                <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>

                <button type="submit" class="btn-login">Iniciar sesión</button>
                <p id="msg-login" style="margin-top: 10px; font-size: 14px;"></p>
            </form>

            <p class="footer-text">
                ¿No tienes una cuenta? <a href="#">Crear cuenta</a>
            </p>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
